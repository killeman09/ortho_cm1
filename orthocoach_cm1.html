<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Atelier des Mots — CM1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap');

:root{
  --ink:#2b2420;
  --paper:#f6f1e6;
  --paper-deep:#efe7d6;
  --card:#fffdf7;
  --rule:#dcd2b8;
  --moss:#52735a;
  --moss-deep:#3c5742;
  --clay:#bd5d3a;
  --clay-deep:#9c4a2c;
  --gold:#caa23a;
  --ok:#3f7a4f;
  --ok-bg:#e3eee0;
  --bad:#a7402c;
  --bad-bg:#f6e2da;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Nunito Sans',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  padding:18px 12px;
  display:flex;
  align-items:flex-start;
  justify-content:center;
}

.container{
  background:var(--card);
  max-width:760px;
  width:100%;
  padding:28px 26px 24px;
  position:relative;
  border:1px solid var(--rule);
  box-shadow:0 1px 0 var(--rule), 0 18px 40px -20px rgba(43,36,32,.35);
}

/* corner stitch marks, like a workbook page */
.container::before, .container::after{
  content:'';
  position:absolute;
  width:14px;height:14px;
  border:2px solid var(--gold);
  opacity:.55;
}
.container::before{top:10px;left:10px;border-right:none;border-bottom:none}
.container::after{bottom:10px;right:10px;border-left:none;border-top:none}

header{display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:4px}
h1{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:30px;
  letter-spacing:.2px;
}
h1 .accent{color:var(--clay)}
.subtitle{
  font-size:12.5px;
  color:#6b6155;
  font-style:italic;
  margin-bottom:18px;
  border-bottom:1px dashed var(--rule);
  padding-bottom:14px;
}

.profiles{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.profile-btn{
  padding:6px 13px;border-radius:999px;border:1.5px solid var(--moss);
  background:transparent;color:var(--moss-deep);cursor:pointer;
  font-size:12px;font-weight:700;font-family:inherit;transition:.2s;
}
.profile-btn.active{background:var(--moss);color:#fff;border-color:var(--moss)}
.profile-btn:hover{background:var(--moss);color:#fff}

.tabs{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:6px;margin-bottom:8px}
.tab-btn{
  padding:9px 6px;border:1.5px solid var(--rule);border-radius:8px;background:var(--paper-deep);
  cursor:pointer;font-weight:700;font-size:11.5px;font-family:inherit;color:var(--ink);
  transition:.18s;
}
.tab-btn.active{border-color:var(--clay);background:var(--clay);color:#fff}
.tab-btn:hover:not(.active){border-color:var(--moss);color:var(--moss-deep)}

.domain-row{display:flex;gap:8px;margin:10px 0 4px;font-size:11.5px;color:#6b6155;align-items:center}
.domain-pill{
  padding:4px 11px;border-radius:999px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;font-size:10px;
}
.domain-pill.ortho{background:#e7ecdf;color:var(--moss-deep)}
.domain-pill.conj{background:#f2e2cf;color:var(--clay-deep)}

.question-box{
  background:var(--paper-deep);
  border:1px solid var(--rule);
  border-radius:4px;
  padding:20px 18px;
  margin:14px 0 14px;
  min-height:150px;
  position:relative;
}
.question-title{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin-bottom:13px;line-height:1.4}
.dictation-text{
  font-size:16px;line-height:1.8;color:var(--ink);background:var(--card);
  padding:14px 16px;border-radius:3px;border-left:4px solid var(--clay);margin-bottom:10px;
}
input[type="text"]{
  width:100%;padding:13px 14px;font-size:16px;border:1.5px solid var(--rule);
  border-radius:5px;font-family:inherit;background:var(--card);color:var(--ink);
}
input[type="text"]:focus{outline:none;border-color:var(--clay)}

.qcm-option{
  padding:13px 15px;margin:7px 0;background:var(--card);border:1.5px solid var(--rule);
  border-radius:6px;cursor:pointer;transition:.15s;font-size:14.5px;font-weight:600;
}
.qcm-option:hover{border-color:var(--moss);background:#f1f6ee}
.qcm-option.selected{border-color:var(--clay);background:#fbeee6}
.qcm-option.correct{border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.qcm-option.wrong{border-color:var(--bad);background:var(--bad-bg);color:var(--bad)}

.btn{
  background:var(--clay);color:#fff;border:none;padding:13px 22px;border-radius:6px;
  font-size:15px;font-weight:800;cursor:pointer;width:100%;transition:.18s;font-family:inherit;
  letter-spacing:.2px;
}
.btn:hover{background:var(--clay-deep)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:var(--moss);font-size:12.5px;padding:10px}
.btn-secondary:hover{background:var(--moss-deep)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(68px,1fr));gap:8px;margin-top:16px;padding-top:14px;border-top:1px dashed var(--rule)}
.stat{text-align:center;padding:9px 4px;background:var(--paper-deep);border-radius:6px}
.stat-value{font-family:'Fraunces',serif;font-size:23px;font-weight:700;color:var(--clay-deep)}
.stat-label{font-size:10px;color:#6b6155;margin-top:2px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}

.correction{margin-top:10px;padding:13px 14px;border-radius:5px;display:none;font-size:14px;font-weight:600;line-height:1.5}
.correction.good{background:var(--ok-bg);color:var(--ok);border-left:4px solid var(--ok)}
.correction.bad{background:var(--bad-bg);color:var(--bad);border-left:4px solid var(--bad)}
.rule{font-size:12.5px;margin-top:7px;padding:7px 9px;background:rgba(255,255,255,.6);border-radius:4px;font-weight:600;color:var(--ink)}

.hidden{display:none !important}

.timer{
  position:absolute;top:18px;right:24px;background:var(--clay-deep);color:#fff;
  padding:6px 14px;border-radius:999px;font-weight:800;font-size:14px;font-family:'Fraunces',serif;
}

.achievement{
  position:fixed;top:18px;right:-320px;background:var(--card);padding:14px 18px;border-radius:6px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);transition:.45s;z-index:1000;border-left:4px solid var(--gold);
  font-weight:700;font-size:13.5px;max-width:260px;
}
.achievement.show{right:18px}

.settings{margin-top:14px;padding:14px;background:var(--paper-deep);border-radius:6px;font-size:12.5px;border:1px solid var(--rule)}
.settings-title{font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#6b6155;margin-bottom:8px}
.settings label{display:flex;align-items:center;margin:6px 0;cursor:pointer;font-weight:600}
input[type="checkbox"]{margin-right:8px;width:15px;height:15px;accent-color:var(--clay)}
.settings .btn-secondary{margin-top:8px}

.chart{margin-top:14px;padding:16px 14px 10px;background:var(--card);border:1px solid var(--rule);border-radius:6px;height:140px;display:flex;align-items:end;gap:5px}
.bar{flex:1;background:var(--moss);border-radius:3px 3px 0 0;transition:.4s;min-height:4px;position:relative}
.bar::after{content:attr(data-val);position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;color:var(--moss-deep)}

.lesson{margin-top:14px;padding:16px;background:#f2e2cf;border-radius:6px;border-left:4px solid var(--gold);display:none}
.lesson h3{font-family:'Fraunces',serif;color:var(--clay-deep);margin-bottom:8px;font-size:17px}
.lesson p{line-height:1.6;font-size:14px}
.lesson .example{margin-top:8px;font-style:italic;color:#6b6155}

.progress-ring{width:54px;height:54px;position:absolute;top:18px;left:24px}
.progress-label{position:absolute;top:36px;left:28px;font-size:10px;font-weight:800;color:var(--clay-deep);width:46px;text-align:center}

@media (max-width:480px){
  .container{padding:20px 16px}
  h1{font-size:24px}
}
</style>
</head>
<body>
<div class="container">
  <svg class="progress-ring hidden" id="progressRing" viewBox="0 0 60 60"><circle cx="30" cy="30" r="25" stroke="var(--rule)" stroke-width="5" fill="none"/><circle id="progressCircle" cx="30" cy="30" r="25" stroke="var(--clay)" stroke-width="5" fill="none" stroke-dasharray="157" stroke-dashoffset="157" transform="rotate(-90 30 30)" stroke-linecap="round"/></svg>
  <div class="progress-label hidden" id="progressLabel">0/20</div>
  <div class="timer hidden" id="timer">60s</div>

  <header>
    <h1>L'Atelier <span class="accent">des Mots</span></h1>
  </header>
  <p class="subtitle">Orthographe &amp; conjugaison — CM1 · 500 mots, 50 règles, présent · imparfait · futur · passé composé</p>

  <div class="profiles" id="profiles"></div>

  <div class="tabs">
    <button class="tab-btn active" data-mode="qcm" onclick="setMode('qcm', this)">QCM Ortho</button>
    <button class="tab-btn" data-mode="conj" onclick="setMode('conj', this)">Conjugaison</button>
    <button class="tab-btn" data-mode="dictée" onclick="setMode('dictée', this)">Dictée</button>
    <button class="tab-btn" data-mode="sons" onclick="setMode('sons', this)">🔊 Audio</button>
    <button class="tab-btn" data-mode="chrono" onclick="setMode('chrono', this)">⏱️ Chrono</button>
    <button class="tab-btn" data-mode="boss" onclick="setMode('boss', this)">👑 Boss</button>
    <button class="tab-btn" data-mode="sansfaute" onclick="setMode('sansfaute', this)">💎 Sans Faute</button>
    <button class="tab-btn" data-mode="faibles" onclick="setMode('faibles', this)">🎯 Mes erreurs</button>
    <button class="tab-btn" data-mode="leçon" onclick="setMode('leçon', this)">📚 Leçons</button>
    <button class="tab-btn" data-mode="stats" onclick="setMode('stats', this)">📊 Stats</button>
  </div>

  <div class="domain-row" id="domainRow"></div>

  <div id="game">
    <div class="question-box">
      <div class="question-title" id="question-title">Chargement...</div>
      <div id="question-content"></div>
      <div class="correction" id="correction"></div>
      <div class="lesson" id="lesson"></div>
    </div>
    <div class="btn-row">
      <button class="btn" id="validate-btn" onclick="validate()">Valider</button>
      <button class="btn btn-secondary hidden" id="audio-btn" onclick="playAudio()">🔊 Écouter</button>
    </div>
  </div>

  <div class="chart hidden" id="chart"></div>

  <div class="settings">
    <div class="settings-title">Réglages</div>
    <label><input type="checkbox" id="showRule" checked> Afficher les règles</label>
    <label><input type="checkbox" id="autoNext" checked> Passer automatiquement à la suite</label>
    <label><input type="checkbox" id="saveWeak" checked> Garder les erreurs pour s'entraîner dessus</label>
    <label><input type="checkbox" id="sounds" checked> Sons de réussite</label>
    <button class="btn btn-secondary" onclick="resetStats()">🔄 Réinitialiser mes données</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Score</div></div>
    <div class="stat"><div class="stat-value" id="streak">0</div><div class="stat-label">Série</div></div>
    <div class="stat"><div class="stat-value" id="total">0</div><div class="stat-label">Questions</div></div>
    <div class="stat"><div class="stat-value" id="percent">0%</div><div class="stat-label">Réussite</div></div>
    <div class="stat"><div class="stat-value" id="level">1</div><div class="stat-label">Niveau</div></div>
    <div class="stat"><div class="stat-value" id="xp">0</div><div class="stat-label">XP</div></div>
  </div>
</div>

<div class="achievement" id="achievement"></div>

<script>
/* ===================== DONNÉES ===================== */

const lessons = {
  "Accords": {text:"Les adjectifs s'accordent en genre et en nombre avec le nom qu'ils accompagnent.", example:"Les fleurs rouges, un mur épais, des murs épais."},
  "Féminin": {text:"Pour former le féminin d'un nom ou d'un adjectif : souvent -e, parfois -esse ou -trice.", example:"chat → chatte, prince → princesse, acteur → actrice."},
  "Pluriels": {text:"Le pluriel se forme en général avec -s, mais : -al → -aux, -ou → -oux (sauf 7 exceptions), -eau → -eaux.", example:"cheval → chevaux, bijou → bijoux, château → châteaux."},
  "Homophones": {text:"a/à : 'a' est le verbe avoir (il a), 'à' est une préposition (à Paris).", example:"Il a dix ans et il habite à Lyon."},
  "É/È": {text:"É est un son fermé (été, clé), È est un son ouvert (père, mère, frère).", example:"L'été, mon père va à la pêche."},
  "Présent": {text:"Au présent, les verbes en -er se terminent par -e, -es, -e, -ons, -ez, -ent.", example:"Je chante, tu chantes, il chante, nous chantons."},
  "Imparfait": {text:"L'imparfait se termine toujours par -ais, -ais, -ait, -ions, -iez, -aient, quel que soit le verbe.", example:"Je jouais, nous jouions, ils jouaient."},
  "Futur": {text:"Au futur simple, on ajoute -rai, -ras, -ra, -rons, -rez, -ront après l'infinitif (ou une base proche).", example:"Je jouerai, tu finiras, nous serons."},
  "Passé composé": {text:"Le passé composé se forme avec avoir ou être au présent, suivi du participe passé.", example:"J'ai mangé, elle est partie, nous avons fini."}
};

const database = {
  qcm: [
    {q:"Féminin de « paysan » :", options:["Paysanne","Paysane","Paysante"], correct:0, rule:"-an devient -anne au féminin.", lesson:"Féminin", difficulty:1},
    {q:"Pluriel de « bijou » :", options:["Bijous","Bijoux","Bijouxs"], correct:1, rule:"-ou devient -oux, sauf 7 mots à apprendre par cœur.", lesson:"Pluriels", difficulty:1},
    {q:"Choisis la bonne phrase :", options:["Ses chaussures sont neuves","C'est chaussures sont neuves","Ces chaussures sont neuves"], correct:2, rule:"« Ces » est un déterminant démonstratif pluriel.", lesson:"Homophones", difficulty:2},
    {q:"Accord : Les filles sont ___", options:["content","contente","contentes"], correct:2, rule:"L'adjectif s'accorde au féminin pluriel avec « les filles ».", lesson:"Accords", difficulty:1},
    {q:"Quelle est la bonne orthographe ?", options:["Ognion","Oignon","Ognon"], correct:1, rule:"O-I-G-N-O-N, un mot à mémoriser.", lesson:"Pluriels", difficulty:2},
    {q:"Verbe « aller », présent, avec nous :", options:["Allons","Allon","Allent"], correct:0, rule:"Nous allons — verbe irrégulier à apprendre.", lesson:"Présent", difficulty:1},
    {q:"Quel mot est invariable ?", options:["Très","Trèsse","Trés"], correct:0, rule:"« Très » est un adverbe : il ne s'accorde jamais.", lesson:"Accords", difficulty:2},
    {q:"Complète : Il ___ du pain.", options:["achete","achète","achette"], correct:1, rule:"Le son [è] s'écrit è devant une syllabe muette : il achète.", lesson:"É/È", difficulty:2},
    {q:"Féminin de « acteur » :", options:["Actrice","Acteuse","Acteur"], correct:0, rule:"-eur devient -trice pour certains métiers.", lesson:"Féminin", difficulty:1},
    {q:"a ou à : Il ___ huit ans.", options:["a","à","as"], correct:0, rule:"« a » est ici le verbe avoir, on peut le remplacer par « avait ».", lesson:"Homophones", difficulty:1},
    {q:"Pluriel de « château » :", options:["Châteaus","Châteaux","Châteaues"], correct:1, rule:"-eau devient -eaux au pluriel.", lesson:"Pluriels", difficulty:1},
    {q:"Féminin de « directeur » :", options:["Directrice","Directeure","Directesse"], correct:0, rule:"-teur devient -trice.", lesson:"Féminin", difficulty:2},
    {q:"Choisis : Les enfants ___ leurs cahiers.", options:["range","rangent","rangents"], correct:1, rule:"« Ils/elles » au présent se termine par -ent.", lesson:"Présent", difficulty:1},
    {q:"on / ont : Ils ___ faim.", options:["on","ont","ons"], correct:1, rule:"« ont » est le verbe avoir, on peut le remplacer par « avaient ».", lesson:"Homophones", difficulty:2},
    {q:"Pluriel de « animal » :", options:["Animals","Animaux","Animales"], correct:1, rule:"-al devient -aux au pluriel (sauf quelques exceptions).", lesson:"Pluriels", difficulty:1},
    {q:"Quelle phrase est correcte ?", options:["Mon frère et moi sommes contents","Mon frère et moi sont content","Mon frère et moi est content"], correct:0, rule:"« Mon frère et moi » = nous : accord avec « sommes ».", lesson:"Accords", difficulty:3},
    {q:"son / sont : Ils ___ arrivés.", options:["son","sont"], correct:1, rule:"« sont » est le verbe être, on peut le remplacer par « étaient ».", lesson:"Homophones", difficulty:2},
    {q:"Féminin de « loup » :", options:["Loupe","Louve","Loupette"], correct:1, rule:"Certains féminins sont irréguliers : loup → louve.", lesson:"Féminin", difficulty:3},
    {q:"Complète : Nous ___ demain.", options:["partirons","partiron","partirons"], correct:0, rule:"Futur simple : -rons à la 1ère personne du pluriel.", lesson:"Futur", difficulty:2},
    {q:"Quel verbe est bien conjugué à l'imparfait ?", options:["Je finissais","Je finissai","Je finissait"], correct:0, rule:"L'imparfait se termine toujours par -ais à la 1ère personne.", lesson:"Imparfait", difficulty:2}
  ],
  dictée: [
    {phrase:"Le petit garçon joue dans le jardin.", correct:"Le petit garçon joue dans le jardin.", rule:"L'adjectif « petit » s'accorde avec « garçon ».", lesson:"Accords"},
    {phrase:"Ma sœur prépare un gâteau au chocolat.", correct:"Ma sœur prépare un gâteau au chocolat.", rule:"« Sœur » s'écrit avec un œ collé (tréma sur le e).", lesson:"Féminin"},
    {phrase:"Nous avons visité un vieux château.", correct:"Nous avons visité un vieux château.", rule:"« Vieux » devient « vieil » devant une voyelle, mais reste « vieux » ici.", lesson:"Pluriels"},
    {phrase:"Les enfants ramassent des feuilles mortes.", correct:"Les enfants ramassent des feuilles mortes.", rule:"« Mortes » s'accorde au féminin pluriel avec « feuilles ».", lesson:"Accords"},
    {phrase:"Demain, nous partirons en vacances.", correct:"Demain, nous partirons en vacances.", rule:"« Demain » s'écrit avec un seul m et un seul n.", lesson:"Homophones"},
    {phrase:"Hier, il a mangé toute la tarte.", correct:"Hier, il a mangé toute la tarte.", rule:"Passé composé : avoir au présent + participe passé.", lesson:"Passé composé"},
    {phrase:"L'année dernière, elle habitait à la campagne.", correct:"L'année dernière, elle habitait à la campagne.", rule:"Imparfait : terminaison -ait pour « elle ».", lesson:"Imparfait"}
  ]
};

/* --- Génère des questions d'orthographe supplémentaires (mots du programme CM1) --- */
const motsCM1 = ["école","maison","cahier","crayon","tableau","fenêtre","porte","chaise","livre","cartable","professeur","élève","récréation","cour","ballon","corde","marelle","sauter","courir","rire","chanter","dessiner","peindre","compter","calculer","addition","soustraction","heure","minute","jour","semaine","mois","année","saison","printemps","été","automne","hiver","soleil","lune","étoile","nuage","pluie","vent","neige","froid","chaud","animal","chien","chat","oiseau","poisson","vache","cheval","mouton","cochon","poule","lapin","forêt","arbre","feuille","fleur","fruit","pomme","poire","banane","orange","légume","carotte","tomate","salade","pain","fromage","lait","eau","jus","gâteau","famille","papa","maman","frère","sœur","grand-père","grand-mère","cousin","cousine","ami","amie","voisin","ville","rue","voiture","vélo","bus","train","avion","bateau","mer","plage","sable","vague","montagne","rivière","pont","église","château","magasin","boulangerie","marché","argent","euro","cadeau","fête","anniversaire","Noël","musique","chanson","danse","sport","football","basket","natation","ski","jouet","poupée","puzzle","histoire","conte","princesse","chevalier","dragon","sorcière","magie","rêve","dormir","réveil","matin","midi","soir","nuit","lumière","obscurité","propre","sale","grand","petit","beau","joli","rapide","lent","fort","faible","content","triste","peur","colère","calme","bruyant","silence","parler","écouter","regarder","voir","entendre","sentir","toucher","goûter","odeur","couleur","rouge","bleu","vert","jaune","noir","blanc","gris","rose","violet","marron","difficile","facile","nouveau","ancienne","premier","dernière","long","court","épais","mince","lourd","léger","plein","vide","ouvert","fermé","début","fin","haut","bas","gauche","droite","devant","derrière","dessus","dessous","près","loin","vite","doucement","toujours","jamais","souvent","parfois","beaucoup","peu","assez","trop","bien","mal","mieux","pire"];

function genererDistracteur(mot){
  if(mot.includes('e')) return mot.replace('e','é');
  if(mot.includes('s')) return mot.replace('s','ss');
  return mot + 's';
}

motsCM1.forEach(mot => {
  if(database.qcm.length < 320){
    const d1 = genererDistracteur(mot);
    const d2 = mot.length > 3 ? mot.slice(0,-1) : mot + 'e';
    const opts = [mot, d1, d2].filter((v,i,a)=>a.indexOf(v)===i);
    while(opts.length < 3) opts.push(mot + 't');
    const correctIndex = opts.indexOf(mot);
    database.qcm.push({
      q:`Quelle est la bonne orthographe ?`,
      options:opts,
      correct:correctIndex,
      rule:`« ${mot} » fait partie des mots à connaître en CM1.`,
      lesson:"Pluriels",
      difficulty: mot.length > 7 ? 2 : 1
    });
  }
});

/* --- Conjugaison : générée à partir de verbes types --- */
const verbesConjugaison = [
  {inf:"chanter", groupe:1, present:["chante","chantes","chante","chantons","chantez","chantent"], imparfait:["chantais","chantais","chantait","chantions","chantiez","chantaient"], futur:["chanterai","chanteras","chantera","chanterons","chanterez","chanteront"], pc:["ai chanté","as chanté","a chanté","avons chanté","avez chanté","ont chanté"]},
  {inf:"jouer", groupe:1, present:["joue","joues","joue","jouons","jouez","jouent"], imparfait:["jouais","jouais","jouait","jouions","jouiez","jouaient"], futur:["jouerai","joueras","jouera","jouerons","jouerez","joueront"], pc:["ai joué","as joué","a joué","avons joué","avez joué","ont joué"]},
  {inf:"manger", groupe:1, present:["mange","manges","mange","mangeons","mangez","mangent"], imparfait:["mangeais","mangeais","mangeait","mangions","mangiez","mangeaient"], futur:["mangerai","mangeras","mangera","mangerons","mangerez","mangeront"], pc:["ai mangé","as mangé","a mangé","avons mangé","avez mangé","ont mangé"]},
  {inf:"finir", groupe:2, present:["finis","finis","finit","finissons","finissez","finissent"], imparfait:["finissais","finissais","finissait","finissions","finissiez","finissaient"], futur:["finirai","finiras","finira","finirons","finirez","finiront"], pc:["ai fini","as fini","a fini","avons fini","avez fini","ont fini"]},
  {inf:"grandir", groupe:2, present:["grandis","grandis","grandit","grandissons","grandissez","grandissent"], imparfait:["grandissais","grandissais","grandissait","grandissions","grandissiez","grandissaient"], futur:["grandirai","grandiras","grandira","grandirons","grandirez","grandiront"], pc:["ai grandi","as grandi","a grandi","avons grandi","avez grandi","ont grandi"]},
  {inf:"être", groupe:3, present:["suis","es","est","sommes","êtes","sont"], imparfait:["étais","étais","était","étions","étiez","étaient"], futur:["serai","seras","sera","serons","serez","seront"], pc:["ai été","as été","a été","avons été","avez été","ont été"]},
  {inf:"avoir", groupe:3, present:["ai","as","a","avons","avez","ont"], imparfait:["avais","avais","avait","avions","aviez","avaient"], futur:["aurai","auras","aura","aurons","aurez","auront"], pc:["ai eu","as eu","a eu","avons eu","avez eu","ont eu"]},
  {inf:"aller", groupe:3, present:["vais","vas","va","allons","allez","vont"], imparfait:["allais","allais","allait","allions","alliez","allaient"], futur:["irai","iras","ira","irons","irez","iront"], pc:["suis allé","es allé","est allé","sommes allés","êtes allés","sont allés"]},
  {inf:"faire", groupe:3, present:["fais","fais","fait","faisons","faites","font"], imparfait:["faisais","faisais","faisait","faisions","faisiez","faisaient"], futur:["ferai","feras","fera","ferons","ferez","feront"], pc:["ai fait","as fait","a fait","avons fait","avez fait","ont fait"]},
  {inf:"venir", groupe:3, present:["viens","viens","vient","venons","venez","viennent"], imparfait:["venais","venais","venait","venions","veniez","venaient"], futur:["viendrai","viendras","viendra","viendrons","viendrez","viendront"], pc:["suis venu","es venu","est venu","sommes venus","êtes venus","sont venus"]},
  {inf:"prendre", groupe:3, present:["prends","prends","prend","prenons","prenez","prennent"], imparfait:["prenais","prenais","prenait","prenions","preniez","prenaient"], futur:["prendrai","prendras","prendra","prendrons","prendrez","prendront"], pc:["ai pris","as pris","a pris","avons pris","avez pris","ont pris"]},
  {inf:"voir", groupe:3, present:["vois","vois","voit","voyons","voyez","voient"], imparfait:["voyais","voyais","voyait","voyions","voyiez","voyaient"], futur:["verrai","verras","verra","verrons","verrez","verront"], pc:["ai vu","as vu","a vu","avons vu","avez vu","ont vu"]},
  {inf:"dire", groupe:3, present:["dis","dis","dit","disons","dites","disent"], imparfait:["disais","disais","disait","disions","disiez","disaient"], futur:["dirai","diras","dira","dirons","direz","diront"], pc:["ai dit","as dit","a dit","avons dit","avez dit","ont dit"]},
  {inf:"pouvoir", groupe:3, present:["peux","peux","peut","pouvons","pouvez","peuvent"], imparfait:["pouvais","pouvais","pouvait","pouvions","pouviez","pouvaient"], futur:["pourrai","pourras","pourra","pourrons","pourrez","pourront"], pc:["ai pu","as pu","a pu","avons pu","avez pu","ont pu"]},
  {inf:"vouloir", groupe:3, present:["veux","veux","veut","voulons","voulez","veulent"], imparfait:["voulais","voulais","voulait","voulions","vouliez","voulaient"], futur:["voudrai","voudras","voudra","voudrons","voudrez","voudront"], pc:["ai voulu","as voulu","a voulu","avons voulu","avez voulu","ont voulu"]},
  {inf:"partir", groupe:3, present:["pars","pars","part","partons","partez","partent"], imparfait:["partais","partais","partait","partions","partiez","partaient"], futur:["partirai","partiras","partira","partirons","partirez","partiront"], pc:["suis parti","es parti","est parti","sommes partis","êtes partis","sont partis"]}
];

const pronoms = ["Je","Tu","Il/Elle","Nous","Vous","Ils/Elles"];
const tempsInfo = {
  present:{label:"présent", lesson:"Présent"},
  imparfait:{label:"imparfait", lesson:"Imparfait"},
  futur:{label:"futur simple", lesson:"Futur"},
  pc:{label:"passé composé", lesson:"Passé composé"}
};

function genererQuestionConjugaison(){
  const verbe = verbesConjugaison[Math.floor(Math.random()*verbesConjugaison.length)];
  const tempsKeys = Object.keys(tempsInfo);
  const tempsKey = tempsKeys[Math.floor(Math.random()*tempsKeys.length)];
  const idx = Math.floor(Math.random()*6);
  const bonneForme = verbe[tempsKey][idx];
  const pronom = pronoms[idx];

  // distracteurs : autres personnes du même verbe/temps, ou bonne forme à un autre temps
  let distracteurs = verbe[tempsKey].filter((f,i)=>i!==idx);
  distracteurs = distracteurs.sort(()=>Math.random()-0.5).slice(0,1);
  const autreTempsKeys = tempsKeys.filter(t=>t!==tempsKey);
  const autreTemps = autreTempsKeys[Math.floor(Math.random()*autreTempsKeys.length)];
  distracteurs.push(verbe[autreTemps][idx]);

  const options = [bonneForme, ...distracteurs].filter((v,i,a)=>a.indexOf(v)===i);
  while(options.length < 3){
    options.push(verbe[tempsKeys[Math.floor(Math.random()*tempsKeys.length)]][Math.floor(Math.random()*6)]);
  }
  const finalOptions = options.slice(0,3).sort(()=>Math.random()-0.5);
  const correctIndex = finalOptions.indexOf(bonneForme);

  return {
    q:`Conjugue « ${verbe.inf} » au ${tempsInfo[tempsKey].label}, avec « ${pronom} » :`,
    options: finalOptions,
    correct: correctIndex,
    rule: `${pronom} ${bonneForme} — ${tempsInfo[tempsKey].label} de « ${verbe.inf} ».`,
    lesson: tempsInfo[tempsKey].lesson,
    difficulty: verbe.groupe === 3 ? 3 : (tempsKey === 'imparfait' || tempsKey === 'futur' ? 2 : 1)
  };
}

/* ===================== ÉTAT ===================== */

let mode = 'qcm';
let currentProfile = 'Joueur 1';
let currentQuestion = null;
let score = 0, streak = 0, total = 0, xp = 0, level = 1;
let selectedOption = null;
let timerInterval = null, timeLeft = 60;
let sansFauteCount = 0;
let profiles = {};
let weakPoints = [];
let history = [];

try{ profiles = JSON.parse(localStorage.getItem('atelierProfiles') || '{}'); }catch(e){ profiles = {}; }
if(Object.keys(profiles).length === 0) profiles = {"Joueur 1":{}};

const domainLabel = {
  qcm:{label:"Orthographe", cls:"ortho"},
  dictée:{label:"Orthographe", cls:"ortho"},
  sons:{label:"Orthographe", cls:"ortho"},
  conj:{label:"Conjugaison", cls:"conj"},
  chrono:{label:"Mixte", cls:"ortho"},
  boss:{label:"Mixte · difficile", cls:"conj"},
  sansfaute:{label:"Mixte", cls:"ortho"},
  faibles:{label:"Mes erreurs", cls:"conj"}
};

/* ===================== PROFILS ===================== */

function initProfiles(){
  const div = document.getElementById('profiles');
  div.innerHTML = Object.keys(profiles).map(p =>
    `<button class="profile-btn ${p===currentProfile?'active':''}" onclick="switchProfile('${p}')">${p}</button>`
  ).join('') + `<button class="profile-btn" onclick="addProfile()">+ Nouveau</button>`;
  loadProfile();
}

function switchProfile(p){
  saveProfile();
  currentProfile = p;
  initProfiles();
}

function addProfile(){
  const name = prompt('Prénom du joueur :');
  if(name && !profiles[name]){
    profiles[name] = {};
    localStorage.setItem('atelierProfiles', JSON.stringify(profiles));
    currentProfile = name;
    initProfiles();
  }
}

function saveProfile(){
  profiles[currentProfile] = {score,streak,total,xp,level,weakPoints,history,sansFauteCount};
  localStorage.setItem('atelierProfiles', JSON.stringify(profiles));
}

function loadProfile(){
  const p = profiles[currentProfile] || {};
  score = p.score||0; streak = p.streak||0; total = p.total||0;
  xp = p.xp||0; level = p.level||1;
  weakPoints = p.weakPoints||[];
  history = p.history||[];
  sansFauteCount = p.sansFauteCount||0;
  updateStats();
  newQuestion();
}

/* ===================== MODES ===================== */

function setMode(m, btn){
  mode = m;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');

  document.getElementById('audio-btn').classList.toggle('hidden', m !== 'sons');
  document.getElementById('timer').classList.toggle('hidden', m !== 'chrono');
  document.getElementById('chart').classList.toggle('hidden', m !== 'stats');
  document.getElementById('progressRing').classList.toggle('hidden', m !== 'sansfaute');
  document.getElementById('progressLabel').classList.toggle('hidden', m !== 'sansfaute');
  document.getElementById('game').classList.toggle('hidden', m === 'stats');

  clearInterval(timerInterval);
  if(m === 'chrono') startTimer();

  updateDomainRow();

  if(m === 'leçon') showLesson();
  else if(m === 'stats') showChart();
  else newQuestion();
}

function updateDomainRow(){
  const info = domainLabel[mode];
  const row = document.getElementById('domainRow');
  if(!info || mode === 'leçon' || mode === 'stats'){ row.innerHTML=''; return; }
  row.innerHTML = `<span class="domain-pill ${info.cls}">${info.label}</span>`;
}

function showLesson(){
  const names = Object.keys(lessons);
  const lessonName = names[Math.floor(Math.random()*names.length)];
  const l = lessons[lessonName];
  document.getElementById('lesson').style.display = 'block';
  document.getElementById('lesson').innerHTML = `<h3>📚 ${lessonName}</h3><p>${l.text}</p><p class="example">Exemple : ${l.example}</p>`;
  document.getElementById('question-title').textContent = 'Leçon du jour';
  document.getElementById('question-content').innerHTML = '<p style="color:#6b6155">Lis la leçon, puis entraîne-toi en mode QCM ou Conjugaison !</p>';
  document.getElementById('validate-btn').textContent = "J'ai compris → une autre leçon";
  document.getElementById('validate-btn').onclick = showLesson;
}

function showChart(){
  const chart = document.getElementById('chart');
  chart.innerHTML = '';
  const last10 = history.slice(-10);
  if(last10.length === 0){
    chart.innerHTML = '<p style="color:#6b6155;font-size:13px;margin:auto">Pas encore de données — joue une partie pour voir ton graphique !</p>';
    return;
  }
  const max = Math.max(...last10.map(h=>h.score), 1);
  last10.forEach(h => {
    const height = (h.score/max)*120 + 5;
    chart.innerHTML += `<div class="bar" style="height:${height}px" data-val="${h.score}"></div>`;
  });
}

/* ===================== QUESTIONS ===================== */

function pickPool(){
  if(mode === 'conj') return null; // généré dynamiquement
  if(mode === 'boss'){
    const pool = database.qcm.filter(q => q.difficulty >= 3);
    return pool.length ? pool : database.qcm.filter(q => q.difficulty >= 2);
  }
  if(mode === 'faibles') return weakPoints.length ? weakPoints : null;
  if(['qcm','chrono','sansfaute'].includes(mode)) return database.qcm;
  if(mode === 'dictée' || mode === 'sons') return database.dictée;
  return database.qcm;
}

function newQuestion(){
  document.getElementById('correction').style.display = 'none';
  document.getElementById('lesson').style.display = 'none';
  document.getElementById('validate-btn').disabled = false;
  document.getElementById('validate-btn').textContent = 'Valider';
  document.getElementById('validate-btn').onclick = validate;
  selectedOption = null;

  if(mode === 'boss' || mode === 'conj'){
    // mélange Boss : moitié conjugaison, moitié ortho difficile
    if(mode === 'boss' && Math.random() < 0.5){
      currentQuestion = genererQuestionConjugaison();
    } else if(mode === 'conj'){
      currentQuestion = genererQuestionConjugaison();
    } else {
      const pool = pickPool();
      currentQuestion = pool[Math.floor(Math.random()*pool.length)];
    }
  } else {
    let pool = pickPool();
    if(!pool || pool.length === 0){
      document.getElementById('question-title').textContent = "Pas encore d'erreurs enregistrées 🎉";
      document.getElementById('question-content').innerHTML = '<p style="color:#6b6155">Continue à t\'entraîner, tes erreurs apparaîtront ici pour que tu puisses les retravailler.</p>';
      document.getElementById('validate-btn').disabled = true;
      return;
    }
    currentQuestion = pool[Math.floor(Math.random()*pool.length)];
  }

  document.getElementById('question-title').textContent = currentQuestion.q || currentQuestion.phrase;

  const content = document.getElementById('question-content');
  const isQCMStyle = currentQuestion.options !== undefined;

  if(isQCMStyle){
    content.innerHTML = currentQuestion.options.map((opt, i) =>
      `<div class="qcm-option" onclick="selectOption(${i})">${opt}</div>`
    ).join('');
  } else {
    const text = mode === 'sons' ? "🔊 Écoute la phrase puis écris-la" : `✏️ Écris : « ${currentQuestion.phrase} »`;
    content.innerHTML = `<div class="dictation-text">${text}</div>
                         <input type="text" id="user-input" placeholder="Tape ta réponse ici..." autocomplete="off">`;
  }

  if(mode === 'sansfaute') updateProgressRing();
}

function selectOption(i){
  selectedOption = i;
  document.querySelectorAll('.qcm-option').forEach((el, idx) => {
    el.classList.remove('selected','correct','wrong');
    if(idx === i) el.classList.add('selected');
  });
}

function playAudio(){
  if(!currentQuestion || !currentQuestion.phrase) return;
  const utterance = new SpeechSynthesisUtterance(currentQuestion.phrase);
  utterance.lang = 'fr-FR';
  utterance.rate = 0.85;
  utterance.pitch = 1.05;
  speechSynthesis.speak(utterance);
}

/* ===================== CHRONO ===================== */

function startTimer(){
  timeLeft = 60;
  updateTimer();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer();
    if(timeLeft <= 0){
      clearInterval(timerInterval);
      if(selectedOption !== null || document.getElementById('user-input')) validate();
      else newQuestion();
    }
  }, 1000);
}

function updateTimer(){
  const t = document.getElementById('timer');
  t.textContent = timeLeft + 's';
  t.style.background = timeLeft < 10 ? 'var(--bad)' : 'var(--clay-deep)';
}

function updateProgressRing(){
  const target = 20;
  const offset = 157 - Math.min(sansFauteCount/target, 1)*157;
  document.getElementById('progressCircle').style.strokeDashoffset = offset;
  document.getElementById('progressLabel').textContent = `${sansFauteCount}/${target}`;
}

/* ===================== VALIDATION ===================== */

function validate(){
  clearInterval(timerInterval);

  const isQCMStyle = currentQuestion.options !== undefined;
  if(isQCMStyle && selectedOption === null){ alert('Choisis une réponse !'); return; }
  if(!isQCMStyle && !document.getElementById('user-input')?.value.trim()){ alert('Écris ta réponse !'); return; }

  let isCorrect = false;
  if(isQCMStyle){
    isCorrect = selectedOption === currentQuestion.correct;
    document.querySelectorAll('.qcm-option').forEach((el, idx) => {
      if(idx === currentQuestion.correct) el.classList.add('correct');
      else if(idx === selectedOption && !isCorrect) el.classList.add('wrong');
    });
  } else {
    const userInput = document.getElementById('user-input').value.trim().toLowerCase().replace(/[.,!?]/g,'');
    const correct = currentQuestion.correct.toLowerCase().replace(/[.,!?]/g,'');
    isCorrect = userInput === correct;
  }

  total++;
  if(isCorrect){
    score++;
    streak++;
    xp += (mode === 'boss') ? 5 : 2;
    if(mode === 'sansfaute') sansFauteCount++; else if(mode !== 'sansfaute') {}
    if(document.getElementById('sounds').checked) playSound(true);
    showCorrection(true, "Bravo ! 🎉 " + (document.getElementById('showRule').checked ? currentQuestion.rule : ""));
    checkAchievements();
  } else {
    streak = 0;
    if(mode === 'sansfaute') sansFauteCount = 0;
    if(document.getElementById('sounds').checked) playSound(false);
    if(document.getElementById('saveWeak').checked && !weakPoints.find(w => w.q === currentQuestion.q)){
      weakPoints.push(currentQuestion);
      if(weakPoints.length > 40) weakPoints.shift();
    }
    const correctAnswer = isQCMStyle ? currentQuestion.options[currentQuestion.correct] : currentQuestion.correct;
    showCorrection(false, "La bonne réponse était : " + correctAnswer +
      (document.getElementById('showRule').checked ? "<div class='rule'>💡 " + currentQuestion.rule + "</div>" : ""));
  }

  history.push({score:score, total:total, date:Date.now()});
  if(history.length > 200) history.shift();

  const newLevel = Math.floor(xp/50)+1;
  if(newLevel > level){
    level = newLevel;
    showAchievement(`🎉 Niveau ${level} débloqué !`);
  }

  if(mode === 'sansfaute') updateProgressRing();

  updateStats();
  saveProfile();
  document.getElementById('validate-btn').disabled = true;

  if(document.getElementById('autoNext').checked) setTimeout(newQuestion, 2200);
  else {
    document.getElementById('validate-btn').textContent = 'Suivant';
    document.getElementById('validate-btn').disabled = false;
    document.getElementById('validate-btn').onclick = newQuestion;
  }
}

function playSound(success){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = success ? 880 : 220;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start();
    osc.stop(ctx.currentTime + 0.3);
  }catch(e){ /* audio non disponible */ }
}

function showCorrection(isGood, text){
  const corr = document.getElementById('correction');
  corr.className = 'correction ' + (isGood ? 'good' : 'bad');
  corr.innerHTML = text;
  corr.style.display = 'block';
}

function updateStats(){
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;
  document.getElementById('total').textContent = total;
  document.getElementById('percent').textContent = total > 0 ? Math.round(score/total*100) + '%' : '0%';
  document.getElementById('level').textContent = level;
  document.getElementById('xp').textContent = xp;
}

function checkAchievements(){
  if(streak === 10) showAchievement('🔥 Série de 10 bonnes réponses !');
  if(score === 50) showAchievement('⭐ 50 bonnes réponses au total !');
  if(sansFauteCount === 20) showAchievement('💎 20 sans faute d\'affilée !');
}

function showAchievement(text){
  const a = document.getElementById('achievement');
  a.textContent = text;
  a.classList.add('show');
  setTimeout(() => a.classList.remove('show'), 3000);
}

function resetStats(){
  if(confirm('Supprimer toutes les données de ' + currentProfile + ' ?')){
    score = streak = total = xp = 0;
    level = 1;
    weakPoints = [];
    history = [];
    sansFauteCount = 0;
    saveProfile();
    updateStats();
    newQuestion();
  }
}

/* ===================== INIT ===================== */
updateDomainRow();
initProfiles();
</script>
